port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
  fallback:
  - 8.8.8.8
  - 1.1.1.1
proxies: []
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - ⚡ 自动选择
  - DIRECT
- name: ⚡ 自动选择
  type: url-test
  proxies: []
  url: http://www.gstatic.com/generate_204
  interval: 300
- name: 🌍 全球直连
  type: select
  proxies:
  - DIRECT
  - 🚀 节点选择
- name: 🛑 广告拦截
  type: select
  proxies:
  - REJECT
  - DIRECT
  - 🚀 节点选择
- name: 🐟 漏网之鱼
  type: select
  proxies:
  - 🚀 节点选择
  - DIRECT
  - ⚡ 自动选择
rules:
- GEOIP,LAN,DIRECT
- GEOIP,CN,🌍 全球直连
- MATCH,🐟 漏网之鱼
